version: "3.8"

# 默认使用阿里云ACR镜像（需要用户根据实际情况修改镜像地址）
# 镜像地址格式: crpi-xxx.cn-qingdao.personal.cr.aliyuncs.com/命名空间/镜像名:版本

services:
  mysql:
    image: ${MYSQL_IMAGE:-crpi-h8wdp3y1iogi9wj4.cn-qingdao.personal.cr.aliyuncs.com/ihee_docker_project/mysql:8.0}
    container_name: expiry-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-expiry_management}
      MYSQL_USER: ${MYSQL_USER:-expiry_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - expiry-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: ${REDIS_IMAGE:-crpi-h8wdp3y1iogi9wj4.cn-qingdao.personal.cr.aliyuncs.com/ihee_docker_project/redis:7-alpine}
    container_name: expiry-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - expiry-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        NODE_IMAGE: ${NODE_IMAGE:-crpi-h8wdp3y1iogi9wj4.cn-qingdao.personal.cr.aliyuncs.com/ihee_docker_project/node:18-alpine}
    container_name: expiry-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - DATABASE_URL=mysql://${MYSQL_USER:-expiry_user}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE:-expiry_management}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - CORS_ORIGIN=${CORS_ORIGIN}
      - FEISHU_APP_ID=${FEISHU_APP_ID:-}
      - FEISHU_APP_SECRET=${FEISHU_APP_SECRET:-}
      - FEISHU_REDIRECT_URI=${FEISHU_REDIRECT_URI:-}
      - ALIYUN_ACCESS_KEY_ID=${ALIYUN_ACCESS_KEY_ID:-}
      - ALIYUN_ACCESS_KEY_SECRET=${ALIYUN_ACCESS_KEY_SECRET:-}
      - ALIYUN_SMS_SIGN_NAME=${ALIYUN_SMS_SIGN_NAME:-}
      - ALIYUN_SMS_TEMPLATE_CODE_REGISTER=${ALIYUN_SMS_TEMPLATE_CODE_REGISTER:-}
      - ALIYUN_SMS_TEMPLATE_CODE_RESET=${ALIYUN_SMS_TEMPLATE_CODE_RESET:-}
      - ALIYUN_SMS_TEMPLATE_CODE_REMINDER=${ALIYUN_SMS_TEMPLATE_CODE_REMINDER:-}
    networks:
      - expiry-network
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NODE_IMAGE: ${NODE_IMAGE:-crpi-h8wdp3y1iogi9wj4.cn-qingdao.personal.cr.aliyuncs.com/ihee_docker_project/node:18-alpine}
        NGINX_IMAGE: ${NGINX_IMAGE:-crpi-h8wdp3y1iogi9wj4.cn-qingdao.personal.cr.aliyuncs.com/ihee_docker_project/nginx:alpine}
    container_name: expiry-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - expiry-network

volumes:
  mysql_data:
  redis_data:

networks:
  expiry-network:
    driver: bridge
