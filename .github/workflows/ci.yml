name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      # 后端检查
      - name: Install backend dependencies
        run: cd backend && npm ci
      
      - name: Build backend
        run: cd backend && npm run build
      
      # 前端检查
      - name: Install frontend dependencies
        run: cd frontend && npm ci
      
      - name: Build frontend
        run: cd frontend && npm run build

      # 成功通知
      - name: Notify Feishu Success
        if: success()
        run: |
          curl -X POST ${{ secrets.FEISHU_WEBHOOK }} \
          -H "Content-Type: application/json" \
          -d '{"msg_type":"text","content":{"text":"✅ CI检查通过\n📦 项目：expiry-management-system\n🔀 分支：main\n👤 提交者：${{ github.actor }}\n📝 Commit：${{ github.event.head_commit.message }}"}}'          

      # 失败通知
      - name: Notify Feishu Failure
        if: failure()
        run: |
          curl -X POST ${{ secrets.FEISHU_WEBHOOK }} \
          -H "Content-Type: application/json" \
          -d '{"msg_type":"text","content":{"text":"❌ CI检查失败\n📦 项目：expiry-management-system\n🔀 分支：main\n👤 提交者：${{ github.actor }}\n📝 Commit：${{ github.event.head_commit.message }}\n⚠️ 请检查代码后重新推送"}}'          
